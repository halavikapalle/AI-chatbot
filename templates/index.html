<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DecoBot | Rule-Based AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --surface2: #1a1a24;
    --border:   #2a2a3a;
    --accent:   #7c6ef5;
    --accent2:  #4ecdc4;
    --text:     #e8e8f0;
    --muted:    #6b6b80;
    --user-bg:  #7c6ef5;
    --bot-bg:   #1a1a24;
    --mono:     'Space Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  }
  .bot-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 16px; color: white; font-weight: 700;
    flex-shrink: 0; position: relative;
  }
  .bot-avatar::after {
    content: ''; width: 10px; height: 10px;
    border-radius: 50%; background: #22c55e;
    border: 2px solid var(--surface);
    position: absolute; bottom: -2px; right: -2px;
  }
  .header-info h1 { font-family: var(--mono); font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
  .header-info p  { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .header-badge   { margin-left: auto; font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--accent); color: var(--accent); }
  #msgs {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
  }
  #msgs::-webkit-scrollbar { width: 4px; }
  #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg-row { display: flex; gap: 10px; animation: fadeUp 0.25s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    flex-shrink: 0; align-self: flex-end;
  }
  .bot-row .msg-avatar { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
  .user .msg-avatar    { background: var(--user-bg); color: white; }
  .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 72%; }
  .user .bubble-wrap   { align-items: flex-end; }
  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-break: break-word; }
  .bot-row .bubble { background: var(--bot-bg); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .user .bubble    { background: var(--user-bg); color: white; border-bottom-right-radius: 4px; }
  .bubble-time     { font-size: 10px; color: var(--muted); font-family: var(--mono); padding: 0 4px; }
  .typing-row { display: flex; gap: 10px; align-items: flex-end; }
  .typing-av  { width:32px;height:32px;border-radius:8px;background:var(--surface2);color:var(--accent);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0; }
  .typing-bubble { background:var(--bot-bg);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;padding:14px 18px;display:flex;gap:5px;align-items:center; }
  .dot { width:6px;height:6px;border-radius:50%;background:var(--muted);animation:pulse 1.4s infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes pulse{0%,80%,100%{opacity:0.3;transform:scale(0.9)}40%{opacity:1;transform:scale(1)}}
  #chips { padding: 10px 20px 4px; display: flex; flex-wrap: wrap; gap: 7px; flex-shrink: 0; }
  .chip { font-family:var(--mono);font-size:11px;padding:6px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s; }
  .chip:hover { border-color:var(--accent);color:var(--accent);background:rgba(124,110,245,0.08); }
  #inputrow { padding:14px 20px;display:flex;gap:10px;align-items:center;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0; }
  #inp { flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:14px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color 0.15s; }
  #inp::placeholder { color: var(--muted); }
  #inp:focus { border-color: var(--accent); }
  #sendbtn { width:42px;height:42px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0; }
  #sendbtn:hover { background:#6a5ce0;transform:scale(1.04); }
  #sendbtn svg { width:18px;height:18px;fill:white; }
  footer { text-align:center;font-family:var(--mono);font-size:10px;color:var(--muted);padding:8px;letter-spacing:0.05em;border-top:1px solid var(--border); }
  .sys-msg { text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);padding:4px 12px;position:relative; }
  .sys-msg::before,.sys-msg::after{content:'';position:absolute;top:50%;width:28%;height:1px;background:var(--border);}
  .sys-msg::before{left:0} .sys-msg::after{right:0}
  body.offline #inp,body.offline #sendbtn,body.offline #chips{opacity:0.5;pointer-events:none;}
  .online-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:5px;}
</style>
</head>
<body>

<header>
  <div class="bot-avatar">DB</div>
  <div class="header-info">
    <h1>DECOBOT</h1>
    <p id="status-line"><span class="online-dot"></span>ONLINE · RULE-BASED AI ENGINE</p>
  </div>
  <div class="header-badge">BATCH 2026</div>
</header>

<div id="msgs">
  <div class="sys-msg">SESSION STARTED</div>
</div>

<div id="chips">
  <button class="chip" id="c1">hello</button>
  <button class="chip" id="c2">who are you</button>
  <button class="chip" id="c3">what is ai</button>
  <button class="chip" id="c4">what is ml</button>
  <button class="chip" id="c5">tell me a joke</button>
  <button class="chip" id="c6">help</button>
  <button class="chip" id="c7">bye</button>
</div>

<div id="inputrow">
  <input id="inp" type="text" placeholder="Type a message and press Enter..." autocomplete="off"/>
  <button id="sendbtn">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<footer>DECODELABS · INDUSTRIAL TRAINING KIT · PROJECT 1 — RULE-BASED AI CHATBOT</footer>

<script>
  function getTime() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function addMsg(text, role) {
    var msgs = document.getElementById('msgs');
    var row  = document.createElement('div');
    row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot-row');
    var av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'bot' ? 'DB' : 'YOU';
    var wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    var bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;
    var ts = document.createElement('div');
    ts.className = 'bubble-time';
    ts.textContent = getTime();
    wrap.appendChild(bub); wrap.appendChild(ts);
    row.appendChild(av);   row.appendChild(wrap);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    var msgs = document.getElementById('msgs');
    var row  = document.createElement('div');
    row.className = 'typing-row'; row.id = 'typing-indicator';
    var av  = document.createElement('div'); av.className = 'typing-av'; av.textContent = 'DB';
    var bub = document.createElement('div'); bub.className = 'typing-bubble';
    bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.appendChild(av); row.appendChild(bub);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    var t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function goOffline() {
    document.body.classList.add('offline');
    document.getElementById('status-line').innerHTML =
      '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#ef4444;margin-right:5px;"></span>OFFLINE · SESSION ENDED';
    var sys = document.createElement('div');
    sys.className = 'sys-msg'; sys.textContent = 'SESSION ENDED';
    document.getElementById('msgs').appendChild(sys);
  }

  // ── SEND — calls Python Flask backend ──────────────────────
  function send(text) {
    text = text.trim();
    if (!text) return;
    addMsg(text, 'user');
    document.getElementById('inp').value = '';
    showTyping();

    fetch('/get', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      hideTyping();
      addMsg(data.reply, 'bot');
      if (data.exit) setTimeout(goOffline, 600);
    })
    .catch(function() {
      hideTyping();
      addMsg("Connection error. Is Flask running?", 'bot');
    });
  }

  // ── CHIP BUTTONS ───────────────────────────────────────────
  document.getElementById('c1').addEventListener('click', function(){ send('hello'); });
  document.getElementById('c2').addEventListener('click', function(){ send('who are you'); });
  document.getElementById('c3').addEventListener('click', function(){ send('what is ai'); });
  document.getElementById('c4').addEventListener('click', function(){ send('what is ml'); });
  document.getElementById('c5').addEventListener('click', function(){ send('tell me a joke'); });
  document.getElementById('c6').addEventListener('click', function(){ send('help'); });
  document.getElementById('c7').addEventListener('click', function(){ send('bye'); });

  document.getElementById('sendbtn').addEventListener('click', function(){ send(document.getElementById('inp').value); });
  document.getElementById('inp').addEventListener('keydown', function(e){ if(e.key==='Enter') send(this.value); });

  // ── BOOT MESSAGE ───────────────────────────────────────────
  window.onload = function() {
    showTyping();
    setTimeout(function() {
      hideTyping();
      addMsg("Hello! I'm DecoBot — a rule-based AI chatbot built for DecodeLabs Batch 2026. Ask me anything!", 'bot');
    }, 1000);
  };
</script>
</body>
</html>
